name: Publish Packages
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_publish_all:
        description: "Force publish all packages (skips version check)"
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Get current versions
        id: current_versions
        run: |
          echo "bottom_sheet_modal=$(node -p "require('./projects/bottom-sheet-modal/package.json').version")" >> $GITHUB_OUTPUT
          echo "phonenumbers=$(node -p "require('./projects/phonenumbers/package.json').version")" >> $GITHUB_OUTPUT
          echo "toast=$(node -p "require('./projects/toast/package.json').version")" >> $GITHUB_OUTPUT

      - name: Get previous versions
        id: previous_versions
        run: |
          git fetch --prune --unshallow || true
          echo "bottom_sheet_modal=$(git show HEAD~1:projects/bottom-sheet-modal/package.json | node -p "JSON.parse(require('fs').readFileSync(0)).version")" >> $GITHUB_OUTPUT
          echo "phonenumbers=$(git show HEAD~1:projects/phonenumbers/package.json | node -p "JSON.parse(require('fs').readFileSync(0)).version")" >> $GITHUB_OUTPUT
          echo "toast=$(git show HEAD~1:projects/toast/package.json | node -p "JSON.parse(require('fs').readFileSync(0)).version")" >> $GITHUB_OUTPUT

      - name: Check if versions changed
        id: version_check
        run: |
          if [ "${{ steps.current_versions.outputs.bottom_sheet_modal }}" != "${{ steps.previous_versions.outputs.bottom_sheet_modal }}" ]; then
            echo "bottom_sheet_modal_changed=true" >> $GITHUB_OUTPUT
          else
            echo "bottom_sheet_modal_changed=false" >> $GITHUB_OUTPUT
          fi
          if [ "${{ steps.current_versions.outputs.phonenumbers }}" != "${{ steps.previous_versions.outputs.phonenumbers }}" ]; then
            echo "phonenumbers_changed=true" >> $GITHUB_OUTPUT
          else
            echo "phonenumbers_changed=false" >> $GITHUB_OUTPUT
          fi
          if [ "${{ steps.current_versions.outputs.toast }}" != "${{ steps.previous_versions.outputs.toast }}" ]; then
            echo "toast_changed=true" >> $GITHUB_OUTPUT
          else
            echo "toast_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Check existence on NPM and GitHub
        id: existence_check
        run: |
          # Bottom Sheet Modal
          if npm view @ngx-tailwind-ui/bottom-sheet-modal@${{ steps.current_versions.outputs.bottom_sheet_modal }} version >/dev/null 2>&1; then
            echo "bottom_sheet_modal_npm_exists=true" >> $GITHUB_OUTPUT
          else
            echo "bottom_sheet_modal_npm_exists=false" >> $GITHUB_OUTPUT
          fi
          if gh release view "bottom-sheet-modal@v${{ steps.current_versions.outputs.bottom_sheet_modal }}" >/dev/null 2>&1; then
            echo "bottom_sheet_modal_gh_exists=true" >> $GITHUB_OUTPUT
          else
            echo "bottom_sheet_modal_gh_exists=false" >> $GITHUB_OUTPUT
          fi

          # Phonenumbers
          if npm view @ngx-tailwind-ui/phonenumbers@${{ steps.current_versions.outputs.phonenumbers }} version >/dev/null 2>&1; then
            echo "phonenumbers_npm_exists=true" >> $GITHUB_OUTPUT
          else
            echo "phonenumbers_npm_exists=false" >> $GITHUB_OUTPUT
          fi
          if gh release view "phonenumbers@v${{ steps.current_versions.outputs.phonenumbers }}" >/dev/null 2>&1; then
            echo "phonenumbers_gh_exists=true" >> $GITHUB_OUTPUT
          else
            echo "phonenumbers_gh_exists=false" >> $GITHUB_OUTPUT
          fi

          # Toast
          if npm view @ngx-tailwind-ui/toast@${{ steps.current_versions.outputs.toast }} version >/dev/null 2>&1; then
            echo "toast_npm_exists=true" >> $GITHUB_OUTPUT
          else
            echo "toast_npm_exists=false" >> $GITHUB_OUTPUT
          fi
          if gh release view "toast@v${{ steps.current_versions.outputs.toast }}" >/dev/null 2>&1; then
            echo "toast_gh_exists=true" >> $GITHUB_OUTPUT
          else
            echo "toast_gh_exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        if: |
          (steps.version_check.outputs.bottom_sheet_modal_changed == 'true' || steps.version_check.outputs.phonenumbers_changed == 'true' || steps.version_check.outputs.toast_changed == 'true' || inputs.force_publish_all == true) &&
          (steps.existence_check.outputs.bottom_sheet_modal_npm_exists == 'false' || steps.existence_check.outputs.bottom_sheet_modal_gh_exists == 'false' ||
           steps.existence_check.outputs.phonenumbers_npm_exists == 'false' || steps.existence_check.outputs.phonenumbers_gh_exists == 'false' ||
           steps.existence_check.outputs.toast_npm_exists == 'false' || steps.existence_check.outputs.toast_gh_exists == 'false')
        run: npm ci

      - name: Build Bottom Sheet Modal
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && (steps.version_check.outputs.bottom_sheet_modal_changed == 'true' || inputs.force_publish_all == true) && (steps.existence_check.outputs.bottom_sheet_modal_npm_exists == 'false' || steps.existence_check.outputs.bottom_sheet_modal_gh_exists == 'false')
        run: npm run build bottom-sheet-modal

      - name: Publish Bottom Sheet Modal
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && (steps.version_check.outputs.bottom_sheet_modal_changed == 'true' || inputs.force_publish_all == true) && steps.existence_check.outputs.bottom_sheet_modal_npm_exists == 'false'
        run: npm publish --provenance
        working-directory: ./dist/bottom-sheet-modal

      - name: Create Release Bottom Sheet Modal
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && (steps.version_check.outputs.bottom_sheet_modal_changed == 'true' || inputs.force_publish_all == true) && steps.existence_check.outputs.bottom_sheet_modal_gh_exists == 'false'
        run: |
          PREVIOUS_TAG=$(git describe --tags --match "bottom-sheet-modal@*" --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)
          CHANGES=$(git log $PREVIOUS_TAG..HEAD --oneline -- projects/bottom-sheet-modal)
          gh release create "bottom-sheet-modal@v${{ steps.current_versions.outputs.bottom_sheet_modal }}" \
            --title "bottom-sheet-modal v${{ steps.current_versions.outputs.bottom_sheet_modal }}" \
            --notes "### Cambios en esta versión:
            $CHANGES"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Phonenumbers
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && (steps.version_check.outputs.phonenumbers_changed == 'true' || inputs.force_publish_all == true) && (steps.existence_check.outputs.phonenumbers_npm_exists == 'false' || steps.existence_check.outputs.phonenumbers_gh_exists == 'false')
        run: npm run build phonenumbers

      - name: Publish Phonenumbers
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && (steps.version_check.outputs.phonenumbers_changed == 'true' || inputs.force_publish_all == true) && steps.existence_check.outputs.phonenumbers_npm_exists == 'false'
        run: npm publish --provenance
        working-directory: ./dist/phonenumbers

      - name: Create Release Phonenumbers
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && (steps.version_check.outputs.phonenumbers_changed == 'true' || inputs.force_publish_all == true) && steps.existence_check.outputs.phonenumbers_gh_exists == 'false'
        run: |
          PREVIOUS_TAG=$(git describe --tags --match "phonenumbers@*" --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)
          CHANGES=$(git log $PREVIOUS_TAG..HEAD --oneline -- projects/phonenumbers)
          gh release create "phonenumbers@v${{ steps.current_versions.outputs.phonenumbers }}" \
            --title "phonenumbers v${{ steps.current_versions.outputs.phonenumbers }}" \
            --notes "### Cambios en esta versión:
            $CHANGES"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Toast
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && (steps.version_check.outputs.toast_changed == 'true' || inputs.force_publish_all == true) && (steps.existence_check.outputs.toast_npm_exists == 'false' || steps.existence_check.outputs.toast_gh_exists == 'false')
        run: npm run build toast

      - name: Publish Toast
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && (steps.version_check.outputs.toast_changed == 'true' || inputs.force_publish_all == true) && steps.existence_check.outputs.toast_npm_exists == 'false'
        run: npm publish --provenance
        working-directory: ./dist/toast

      - name: Create Release Toast
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && (steps.version_check.outputs.toast_changed == 'true' || inputs.force_publish_all == true) && steps.existence_check.outputs.toast_gh_exists == 'false'
        run: |
          PREVIOUS_TAG=$(git describe --tags --match "toast@*" --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)
          CHANGES=$(git log $PREVIOUS_TAG..HEAD --oneline -- projects/toast)
          gh release create "toast@v${{ steps.current_versions.outputs.toast }}" \
            --title "toast v${{ steps.current_versions.outputs.toast }}" \
            --notes "### Cambios en esta versión:
            $CHANGES"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
